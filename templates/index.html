<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applicazione Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;600;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header>
    <div class="header-badge"></div>
    <div class="header-text">
      <h1>Applicazione Demo</h1>
      <p>System Monitor · aggiornamento ogni 2s</p>
    </div>
    <div class="live-dot">LIVE</div>
  </header>

  <div class="gauges">
    <div class="gauge-card cpu">
      <div class="gauge-label">CPU Usage</div>
      <div class="gauge-value" id="cpu-val">—<span class="gauge-unit">%</span></div>
      <div class="gauge-bar-track">
        <div class="gauge-bar-fill" id="cpu-bar"></div>
      </div>
    </div>
    <div class="gauge-card ram">
      <div class="gauge-label">RAM Usage</div>
      <div class="gauge-value" id="ram-val">—<span class="gauge-unit">%</span></div>
      <div class="gauge-bar-track">
        <div class="gauge-bar-fill" id="ram-bar"></div>
      </div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">Storico — ultimi 6 minuti</span>
      <div class="chart-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#00e5ff"></div> CPU
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#ff4081"></div> RAM
        </div>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="historyChart"></canvas>
    </div>
  </div>

  <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
